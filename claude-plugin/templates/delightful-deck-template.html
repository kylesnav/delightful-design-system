<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck — Delightful Presentation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ==========================================================================
   LAYER ORDER — earlier layers have lower priority
   Primitives layer omitted — slideshow references semantic tokens directly.
   ========================================================================== */
@layer reset, semantic, component, presentation, utilities;

/* ==========================================================================
   SEMANTIC TOKENS — aligned with delightful-design-system.html v0.7.0
   Theme toggle: uses .theme-dark class (not [data-theme]) for presentation isolation
   ========================================================================== */
@layer semantic {
:root, .theme-light {
  color-scheme: light;
  --bg-page: oklch(0.982 0.008 70); --bg-surface: oklch(0.995 0.004 70);
  --bg-elevated: oklch(1.000 0.000 0); --bg-subtle: oklch(0.965 0.012 70);
  --bg-muted: oklch(0.948 0.014 70);
  --text-primary: oklch(0.200 0.015 60); --text-secondary: oklch(0.420 0.015 60);
  --text-muted: oklch(0.560 0.012 60); --text-on-accent: oklch(1.000 0.000 0);
  --text-on-gold: oklch(0.220 0.020 70);
  --border-default: oklch(0.340 0.025 60); --border-strong: oklch(0.250 0.020 60);
  --border-subtle: oklch(0.820 0.015 70);
  --accent-primary: oklch(0.640 0.270 350); --accent-primary-hover: oklch(0.580 0.280 350);
  --accent-primary-subtle: oklch(0.955 0.040 350); --accent-primary-text: oklch(0.560 0.270 350);
  --accent-danger: oklch(0.620 0.220 20); --accent-danger-hover: oklch(0.570 0.230 20);
  --accent-danger-subtle: oklch(0.950 0.040 20); --accent-danger-text: oklch(0.570 0.220 20);
  --accent-gold: oklch(0.840 0.175 85); --accent-gold-hover: oklch(0.820 0.165 84);
  --accent-gold-subtle: oklch(0.965 0.060 85); --accent-gold-text: oklch(0.560 0.170 85);
  --accent-cyan: oklch(0.650 0.148 210); --accent-cyan-hover: oklch(0.600 0.150 210);
  --accent-cyan-subtle: oklch(0.945 0.030 210); --accent-cyan-text: oklch(0.560 0.148 210);
  --accent-green: oklch(0.630 0.170 148); --accent-green-hover: oklch(0.580 0.165 148);
  --accent-green-subtle: oklch(0.945 0.035 148); --accent-green-text: oklch(0.520 0.170 148);
  --accent-purple: oklch(0.640 0.220 300); --accent-purple-hover: oklch(0.580 0.230 300);
  --accent-purple-subtle: oklch(0.950 0.035 300); --accent-purple-text: oklch(0.560 0.230 300);
  --status-info: var(--accent-primary); --status-error: var(--accent-danger);
  --status-warning: var(--accent-gold); --status-success: var(--accent-green);
  --focus-ring: var(--accent-primary); --overlay-bg: oklch(0.200 0.015 60 / 0.30);
  --shadow-sm: 2px 2px 0 var(--border-default); --shadow-md: 4px 4px 0 var(--border-default);
  --shadow-lg: 8px 8px 0 var(--border-default);
  --shadow-pink: 4px 4px 0 var(--accent-primary); --shadow-danger: 4px 4px 0 var(--accent-danger);
  --shadow-gold: 4px 4px 0 var(--accent-gold); --shadow-cyan: 4px 4px 0 var(--accent-cyan);
  --shadow-green: 4px 4px 0 var(--accent-green); --shadow-purple: 4px 4px 0 var(--accent-purple);
}
.theme-dark {
  color-scheme: dark;
  --bg-page: oklch(0.140 0.014 65); --bg-surface: oklch(0.165 0.015 65);
  --bg-elevated: oklch(0.190 0.015 65); --bg-subtle: oklch(0.210 0.015 65);
  --bg-muted: oklch(0.180 0.013 65);
  --text-primary: oklch(0.935 0.008 70); --text-secondary: oklch(0.690 0.012 70);
  --text-muted: oklch(0.540 0.010 70); --text-on-accent: oklch(1.000 0.000 0);
  --text-on-gold: oklch(0.140 0.014 65);
  --border-default: oklch(0.550 0.010 65); --border-strong: var(--text-primary);
  --border-subtle: oklch(0.330 0.015 65);
  --accent-primary: oklch(0.700 0.230 350); --accent-primary-hover: oklch(0.740 0.220 350);
  --accent-primary-subtle: oklch(0.250 0.065 350); --accent-primary-text: oklch(0.750 0.210 350);
  --accent-danger: oklch(0.660 0.200 20); --accent-danger-hover: oklch(0.700 0.190 20);
  --accent-danger-subtle: oklch(0.250 0.055 20); --accent-danger-text: oklch(0.720 0.180 20);
  --accent-gold: oklch(0.840 0.170 85); --accent-gold-hover: oklch(0.870 0.155 84);
  --accent-gold-subtle: oklch(0.260 0.065 85); --accent-gold-text: oklch(0.870 0.155 85);
  --accent-cyan: oklch(0.720 0.140 210); --accent-cyan-hover: oklch(0.760 0.130 210);
  --accent-cyan-subtle: oklch(0.250 0.045 210); --accent-cyan-text: oklch(0.780 0.130 210);
  --accent-green: oklch(0.680 0.155 148); --accent-green-hover: oklch(0.720 0.145 148);
  --accent-green-subtle: oklch(0.250 0.048 148); --accent-green-text: oklch(0.740 0.145 148);
  --accent-purple: oklch(0.700 0.200 300); --accent-purple-hover: oklch(0.740 0.190 300);
  --accent-purple-subtle: oklch(0.250 0.055 300); --accent-purple-text: oklch(0.760 0.180 300);
  --focus-ring: oklch(0.700 0.230 350); --overlay-bg: oklch(0 0 0 / 0.60);
  --shadow-sm: 2px 2px 0 oklch(0.920 0.010 65); --shadow-md: 4px 4px 0 oklch(0.920 0.010 65);
  --shadow-lg: 8px 8px 0 oklch(0.920 0.010 65);
  --shadow-pink: 4px 4px 0 var(--accent-primary); --shadow-danger: 4px 4px 0 var(--accent-danger);
  --shadow-gold: 4px 4px 0 var(--accent-gold); --shadow-cyan: 4px 4px 0 var(--accent-cyan);
  --shadow-green: 4px 4px 0 var(--accent-green); --shadow-purple: 4px 4px 0 var(--accent-purple);

} /* end @layer semantic */

/* ==========================================================================
   COMPONENT TOKENS — foundation: typography, spacing, motion, layout
   ========================================================================== */
@layer component {
:root {
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;
  /* Fluid type scale — Major Third ratio */
  --step--2: clamp(0.694rem, 0.650rem + 0.22vi, 0.800rem);
  --step--1: clamp(0.833rem, 0.775rem + 0.29vi, 1.000rem);
  --step-0: clamp(1.000rem, 0.913rem + 0.43vi, 1.250rem);
  --step-1: clamp(1.200rem, 1.074rem + 0.63vi, 1.5625rem);
  --step-2: clamp(1.440rem, 1.261rem + 0.89vi, 1.953rem);
  --step-3: clamp(1.728rem, 1.480rem + 1.24vi, 2.441rem);
  --step-4: clamp(2.074rem, 1.734rem + 1.70vi, 3.052rem);
  --step-5: clamp(2.488rem, 2.028rem + 2.30vi, 3.815rem);
  /* Tracking */
  --tracking-tight: -0.02em; --tracking-tighter: -0.03em; --tracking-tightest: -0.04em;
  /* Leading */
  --leading-none: 1.0; --leading-tight: 1.15; --leading-snug: 1.3;
  --leading-normal: 1.55; --leading-relaxed: 1.65;
  /* UI text scale — fixed, non-fluid */
  --ui-text-2xs: 0.6875rem; --ui-text-xs: 0.75rem; --ui-text-sm: 0.8125rem;
  --ui-text-md: 0.875rem; --ui-text-lg: 0.9375rem; --ui-text-xl: 1.0625rem;
  /* Spacing — 4px base grid */
  --space-1: 4px; --space-1-5: 6px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
  --space-12: 48px; --space-16: 64px; --space-20: 80px;
  /* Radius */
  --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px;
  --radius-xl: 32px; --radius-full: 9999px;
  /* Control heights */
  --control-sm: 32px; --control-md: 36px; --control-lg: 44px; --control-xl: 56px;
  /* Container widths */
  --container-sm: 640px; --container-md: 960px; --container-lg: 1200px;
  /* Motion */
  --motion-instant: 100ms; --motion-fast: 160ms; --motion-base: 240ms;
  --motion-slow: 360ms; --motion-deliberate: 500ms;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-slam: cubic-bezier(0.55, 0.06, 0.68, 0.19);
  --ease-elastic: cubic-bezier(0.68, -0.55, 0.265, 1.55);
  --ease-spring-gentle: linear(0, 0.006, 0.025 2.8%, 0.101 6.1%, 0.539 18.9%, 0.721 25.3%, 0.849 31.5%, 0.937 38.1%, 0.968 41.8%, 0.991 45.7%, 1.006 50%, 1.015 55%, 1.017 63.9%, 1.001 85.9%, 1);
  --ease-spring-bouncy: linear(0, 0.004, 0.016, 0.035, 0.063 9.1%, 0.141, 0.25, 0.391, 0.563, 0.765, 1, 0.891, 0.813 45.5%, 0.785, 0.766, 0.754, 0.75, 0.754, 0.766, 0.785, 0.813 63.6%, 0.891, 1 72.7%, 0.973, 0.953, 0.941, 0.938, 0.941, 0.953, 0.973, 1, 0.988, 0.984, 0.988, 1);
  /* Z-index */
  --z-base: 1; --z-sticky: 100; --z-fixed: 200; --z-overlay: 300;
  --z-modal: 1000; --z-toast: 1100; --z-tooltip: 1500;
  /* Chart colors */
  --chart-1: var(--accent-primary); --chart-2: var(--accent-gold); --chart-3: var(--accent-cyan);
  --chart-4: var(--accent-green); --chart-5: var(--accent-purple); --chart-6: var(--accent-danger);
}

/* Presentation-only: dynamic accent aliases */
[data-accent="gold"] { --accent: var(--accent-gold); --accent-hover: var(--accent-gold-hover); --accent-subtle: var(--accent-gold-subtle); --accent-text: var(--accent-gold-text); --shadow-accent: var(--shadow-gold); }
[data-accent="danger"] { --accent: var(--accent-danger); --accent-hover: var(--accent-danger-hover); --accent-subtle: var(--accent-danger-subtle); --accent-text: var(--accent-danger-text); --shadow-accent: var(--shadow-danger); }
[data-accent="primary"] { --accent: var(--accent-primary); --accent-hover: var(--accent-primary-hover); --accent-subtle: var(--accent-primary-subtle); --accent-text: var(--accent-primary-text); --shadow-accent: var(--shadow-pink); }
[data-accent="cyan"] { --accent: var(--accent-cyan); --accent-hover: var(--accent-cyan-hover); --accent-subtle: var(--accent-cyan-subtle); --accent-text: var(--accent-cyan-text); --shadow-accent: var(--shadow-cyan); }
[data-accent="green"] { --accent: var(--accent-green); --accent-hover: var(--accent-green-hover); --accent-subtle: var(--accent-green-subtle); --accent-text: var(--accent-green-text); --shadow-accent: var(--shadow-green); }
[data-accent="purple"] { --accent: var(--accent-purple); --accent-hover: var(--accent-purple-hover); --accent-subtle: var(--accent-purple-subtle); --accent-text: var(--accent-purple-text); --shadow-accent: var(--shadow-purple); }
} /* end @layer component */

/* ==========================================================================
   PRESENTATION LAYER — layout, slide system, components, ambient, responsive
   ========================================================================== */
@layer presentation {

/* RESET */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
html { font-family: var(--font-sans); font-size: 16px; line-height: 1.55; color: var(--text-primary); background: var(--bg-page); -webkit-font-smoothing: antialiased; }
body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.025; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 200px 200px; }
.theme-dark body::before { opacity: 0.04; }
a { color: var(--accent-primary-text); text-decoration: none; } a:hover { text-decoration: underline; }

/* LAYOUT — Sidebar */
.sidebar { width: 320px; height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; background: var(--bg-surface); border-right: 2px solid var(--border-default); z-index: var(--z-modal); overflow: hidden; transform: translateX(-100%); transition: transform var(--motion-slow) var(--ease-spring-gentle); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.sidebar.open { transform: translateX(0); }
.sidebar-backdrop { position: fixed; inset: 0; background: var(--overlay-bg); z-index: calc(var(--z-modal) - 1); opacity: 0; pointer-events: none; transition: opacity var(--motion-base) var(--ease-out); }
.sidebar-backdrop.open { opacity: 1; pointer-events: all; }
.sidebar-header { padding: var(--space-5) var(--space-4) var(--space-4); border-bottom: 2px solid var(--border-subtle); flex-shrink: 0; }
.sidebar-brand { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-3); }
.sidebar-brand h1 { font-size: var(--step-1); font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.sidebar-subtitle { font-size: var(--step--2); color: var(--text-muted); font-family: var(--font-mono); letter-spacing: 0.02em; }
.search-trigger { width: 100%; display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); background: var(--bg-muted); border: 2px solid var(--border-subtle); border-radius: var(--radius-sm); color: var(--text-muted); font-size: var(--step--1); font-family: var(--font-sans); cursor: pointer; box-shadow: var(--shadow-sm); transition: all 450ms var(--ease-out); }
.search-trigger:hover { border-color: var(--border-default); transform: translateY(-2px); box-shadow: var(--shadow-md); transition-duration: 125ms; }
.search-trigger:active { transform: translate(2px, 2px); box-shadow: none; transition-duration: 80ms; }
.search-trigger kbd { margin-left: auto; font-family: var(--font-mono); font-size: var(--step--2); padding: 1px 6px; background: var(--bg-surface); border: 2px solid var(--border-subtle); border-radius: 6px; color: var(--text-muted); }
.sidebar-nav { flex: 1; overflow-y: auto; padding: var(--space-3) 0; scrollbar-width: thin; scrollbar-color: var(--border-subtle) transparent; }
.nav-group { margin-bottom: var(--space-2); }
.nav-group-header { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-4); font-size: var(--step--2); font-weight: 600; font-family: var(--font-mono); letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; user-select: none; transition: color var(--motion-fast) var(--ease-out); }
.nav-group-header:hover { color: var(--text-secondary); }
.nav-group[data-group="0"] .nav-group-header { color: var(--accent-gold-text); }
.nav-group[data-group="I"] .nav-group-header { color: var(--accent-primary-text); }
.nav-group[data-group="II"] .nav-group-header { color: var(--accent-purple-text); }
.nav-group[data-group="III"] .nav-group-header { color: var(--accent-cyan-text); }
.nav-group[data-group="IV"] .nav-group-header { color: var(--accent-gold-text); }
.nav-group[data-group="V"] .nav-group-header { color: var(--accent-primary-text); }
.nav-group[data-group="VI"] .nav-group-header { color: var(--accent-green-text); }
.nav-group[data-group="VII"] .nav-group-header { color: var(--accent-cyan-text); }
.nav-group[data-group="VIII"] .nav-group-header { color: var(--accent-purple-text); }
.nav-group[data-group="IX"] .nav-group-header { color: var(--accent-danger-text); }
.nav-group[data-group="X"] .nav-group-header { color: var(--accent-gold-text); }
.nav-group[data-group="XI"] .nav-group-header { color: var(--accent-green-text); }
.nav-group[data-group="XII"] .nav-group-header { color: var(--accent-primary-text); }
.nav-group-header .chevron { font-size: 10px; transition: transform var(--motion-base) var(--ease-spring-gentle); display: inline-block; }
.nav-group.collapsed .chevron { transform: rotate(-90deg); }
.nav-group.collapsed .nav-items { display: none; }
.nav-items { padding: 0 0 var(--space-2); }
.nav-item { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-1) var(--space-4) var(--space-1) var(--space-8); font-size: var(--step--1); color: var(--text-secondary); cursor: pointer; transition: all 450ms var(--ease-out); border-left: 3px solid transparent; line-height: 1.35; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin-right: var(--space-2); }
.nav-item:hover { color: var(--text-primary); background: var(--bg-subtle); transition-duration: 125ms; padding-left: calc(var(--space-8) + 4px); }
.nav-item.active { color: var(--text-primary); font-weight: 500; background: var(--bg-subtle); }
.nav-item.active[data-color="gold"] { border-left-color: var(--accent-gold); }
.nav-item.active[data-color="danger"] { border-left-color: var(--accent-danger); }
.nav-item.active[data-color="primary"] { border-left-color: var(--accent-primary); }
.nav-item.active[data-color="cyan"] { border-left-color: var(--accent-cyan); }
.nav-item.active[data-color="purple"] { border-left-color: var(--accent-purple); }
.nav-item.active[data-color="green"] { border-left-color: var(--accent-green); }
.nav-item-title { flex: 1; }
.slide-pip { font-size: var(--step--2); font-family: var(--font-mono); color: var(--text-muted); margin-left: auto; display: none; }
.sidebar-footer { padding: var(--space-3) var(--space-4); border-top: 2px solid var(--border-subtle); display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0; }
.theme-btn .icon-sun { display: none; } .theme-btn .icon-moon { display: block; }
.theme-dark .theme-btn .icon-sun { display: block; } .theme-dark .theme-btn .icon-moon { display: none; }
.shortcut-hint { font-size: var(--step--2); color: var(--text-muted); font-family: var(--font-mono); }

/* SLIDE SYSTEM */
.deck { position: relative; width: 100vw; height: 100vh; overflow: hidden; transition: background-color 0.8s var(--ease-smooth); }
.deck[data-accent="gold"] { background-color: oklch(0.978 0.006 85); }
.deck[data-accent="danger"] { background-color: oklch(0.978 0.005 20); }
.deck[data-accent="primary"] { background-color: oklch(0.978 0.005 350); }
.deck[data-accent="cyan"] { background-color: oklch(0.978 0.005 210); }
.deck[data-accent="green"] { background-color: oklch(0.978 0.005 148); }
.deck[data-accent="purple"] { background-color: oklch(0.978 0.005 300); }
.theme-dark .deck[data-accent="gold"] { background-color: oklch(0.145 0.010 85); }
.theme-dark .deck[data-accent="danger"] { background-color: oklch(0.145 0.008 20); }
.theme-dark .deck[data-accent="primary"] { background-color: oklch(0.145 0.008 350); }
.theme-dark .deck[data-accent="cyan"] { background-color: oklch(0.145 0.008 210); }
.theme-dark .deck[data-accent="green"] { background-color: oklch(0.145 0.008 148); }
.theme-dark .deck[data-accent="purple"] { background-color: oklch(0.145 0.008 300); }
.slide { position: absolute; inset: 0; opacity: 0; pointer-events: none; display: flex; align-items: center; justify-content: center; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border-subtle) transparent; transition: opacity 0.45s var(--ease-spring-gentle), transform 0.45s var(--ease-spring-gentle); will-change: opacity, transform; }
.slide.active { opacity: 1; pointer-events: all; transform: translateX(0) !important; }
.slide.exit-left { opacity: 0; transform: translateX(-80px); }
.slide.exit-right { opacity: 0; transform: translateX(80px); }
.slide-inner { max-width: 960px; width: 90%; padding: 2rem 0 4rem; position: relative; }

/* Journey progress */
.journey-bar { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: var(--border-subtle); z-index: var(--z-sticky); }
.journey-fill { height: 100%; background: var(--accent); transition: width var(--motion-slow) var(--ease-spring-gentle); border-radius: 0 2px 2px 0; position: relative; }
.journey-fill::after { content: ''; position: absolute; right: -4px; top: -3px; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent-subtle); }
.journey-info { position: fixed; top: 10px; right: 60px; z-index: var(--z-sticky); display: flex; align-items: center; gap: var(--space-3); font-size: var(--step--2); font-family: var(--font-mono); color: var(--text-muted); opacity: 0; transition: opacity 0.3s var(--ease-out); pointer-events: none; }
.journey-info.visible { opacity: 1; }
.journey-info .ji-divider { width: 1px; height: 14px; background: var(--border-subtle); }
.journey-info .ji-time { color: var(--accent-text); font-weight: 500; }

/* Nav chrome */

font-size:var(--step--2);color:var(--text-muted);font-family:var(--font-mono)">Delightful Design System Showcase</div></div>`;};

function ensureR(i){if(i<0||i>=ALL.length)return;const s=ALL[i];if(state.rendered.has(s.id))return;const el=document.createElement('div');el.className='slide';el.dataset.slideId=s.id;el.dataset.accent=s.accentColor;const inner=document.createElement('div');inner.className='slide-inner';el.appendChild(inner);s.render(inner);$('#slideViewport').appendChild(el);state.rendered.set(s.id,{element:el,cleanup:s.cleanup||null});}

function updateChrome(){const s=ALL[state.ci];
$$('.nav-item').forEach(el=>{const a=el.dataset.sectionId===s.sectionId;el.classList.toggle('active',a);const p=el.querySelector('.slide-pip');if(p){if(a&&s.sectionSlideCount>1){p.textContent=(s.sectionIndex+1)+'/'+s.sectionSlideCount;p.style.display='';}else p.style.display='none';}});const ai=$('.nav-item.active');if(ai)ai.scrollIntoView({block:'nearest',behavior:'smooth'});

const jiSlide=$('#jiSlide');const jiTime=$('#jiTime');const ji=$('#journeyInfo');
if(jiSlide&&jiTime&&ji){jiSlide.textContent=(state.ci+1)+' of '+ALL.length;jiTime.textContent=remaining<=0?'Complete':mins<1?'<1 min left':mins+' min left';ji.classList.toggle('visible',state.ci>0);}}

function buildNav(){const n=$('#sidebarNav');let h='';for(const g of SECTION_GROUPS){const gs=SECTIONS.filter(s=>s.groupId===g.id);h+=`<div class="nav-group" data-group="${g.id}"><div class="nav-group-header" onclick="this.parentElement.classList.toggle('collapsed')"><span class="chevron">\u25BC</span><span>${g.id} ${g.title}</span></div><div class="nav-items">`;for(const s of gs){h+=`<div class="nav-item" data-section-id="${s.id}" data-color="${s.color}"><span class="nav-item-title">${s.title}</span><span class="slide-pip"></span></div>`;}h+='</div></div>';}n.innerHTML=h;$$('.nav-item').forEach(el=>{el.addEventListener('click',()=>{const idx=ALL.findIndex(s=>s.sectionId===el.dataset.sectionId);if(idx>=0)nav(idx);$('#sidebar').classList.remove('open');$('#sidebarBackdrop').classList.remove('open');});});}

function toggleTheme(){document.documentElement.classList.toggle('theme-dark');try{localStorage.setItem('ds-theme',document.documentElement.classList.contains('theme-dark')?'dark':'light');}catch(e){}}

function openSearch(){state.searchOpen=true;state.selSearch=-1;$('#searchOverlay').classList.add('open');const i=$('#searchInput');i.value='';i.focus();$('#searchResults').innerHTML='<div class="search-empty">Type to search</div>';}
function closeSearch(){state.searchOpen=false;$('#searchOverlay').classList.remove('open');}
function doSearch(q){if(!q.trim()){$('#searchResults').innerHTML='<div class="search-empty">Type to search</div>';return;}const ql=q.toLowerCase(),res=[],seen=new Set();for(let i=0;i<ALL.length;i++){const s=ALL[i],txt=(s.title+' '+s.slideTitle+' '+(s.searchText||'')).toLowerCase();if(txt.includes(ql)&&!seen.has(s.sectionId||s.id)){seen.add(s.sectionId||s.id);res.push({index:i,slide:s});if(res.length>=15)break;}}if(!res.length){$('#searchResults').innerHTML=`<div class="search-empty">No results for \u201C${q}\u201D</div>`;return;}let h='';res.forEach(r=>{const g=SECTION_GROUPS.find(x=>x.id===r.slide.groupId);h+=`<div class="search-result" data-idx="${r.index}"><div class="search-result-section">${g?g.title:''}</div><div class="search-result-title">${r.slide.title} \u2014 ${r.slide.slideTitle}</div></div>`;});$('#searchResults').innerHTML=h;$$('.search-result').forEach(el=>el.addEventListener('click',()=>{closeSearch();nav(parseInt(el.dataset.idx));}));}

document.addEventListener('keydown',e=>{const tag=e.target.tagName;if(tag==='INPUT'||tag==='TEXTAREA'){if(e.key==='Escape'){closeSearch();e.target.blur();}if(e.key==='Enter'&&state.searchOpen){const r=$$('.search-result'),s=state.selSearch>=0?state.selSearch:0;if(r[s])r[s].click();}if(e.key==='ArrowDown'&&state.searchOpen){e.preventDefault();const r=$$('.search-result');state.selSearch=Math.min(state.selSearch+1,r.length-1);r.forEach((x,i)=>x.classList.toggle('selected',i===state.selSearch));}if(e.key==='ArrowUp'&&state.searchOpen){e.preventDefault();state.selSearch=Math.max(state.selSearch-1,0);$$('.search-result').forEach((x,i)=>x.classList.toggle('selected',i===state.selSearch));}return;}if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();openSearch();return;}if(e.key==='Escape'){closeSearch();$('#shortcutsOverlay').classList.remove('open');return;}if(e.key==='ArrowRight'||e.key==='j'){e.preventDefault();next();}if(e.key==='ArrowLeft'||e.key==='k'){e.preventDefault();prev();}if(e.key==='ArrowDown'||e.key===' '){e.preventDefault();next();}if(e.key==='ArrowUp'){e.preventDefault();prev();}if(e.key==='t')toggleTheme();if(e.key==='?')$('#shortcutsOverlay').classList.toggle('open');});

let tx=0;document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});document.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>50){d>0?next():prev();}});

$('#searchTrigger').addEventListener('click',openSearch);
$('#searchInput').addEventListener('input',e=>doSearch(e.target.value));
$('#searchOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSearch();});
$('#shortcutsOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
$('#themeToggle').addEventListener('click',toggleTheme);
function openToc(){$('#sidebar').classList.add('open');$('#sidebarBackdrop').classList.add('open');}
window.openToc=openToc;
function closeToc(){$('#sidebar').classList.remove('open');$('#sidebarBackdrop').classList.remove('open');}
$('#tocBtn').addEventListener('click',()=>{$('#sidebar').classList.contains('open')?closeToc():openToc();});
$('#sidebarBackdrop').addEventListener('click',closeToc);
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;if(e.key==='n'){$('#sidebar').classList.contains('open')?closeToc():openToc();}});
function buildDots(){const container=$('#navDots');for(let i=0;i<ALL.length;i++){const dot=document.createElement('button');dot.className='nav-dot'+(i===0?' active':'');dot.onclick=()=>nav(i);container.appendChild(dot);}}

const prefersReducedMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function spawnParticles(){if(prefersReducedMotion)return;const c=$('#particles');const cols=['var(--accent-gold)','var(--accent-primary)','var(--accent-cyan)','var(--accent-purple)','var(--accent-green)','var(--accent-danger)'];for(let i=0;i<18;i++){const p=document.createElement('div');p.className='particle';p.style.cssText=`left:${Math.random()*95}%;--size:${2+Math.random()*5}px;--pcolor:${cols[i%cols.length]};--dur:${10+Math.random()*18}s;--delay:${Math.random()*12}s;--drift:${5+Math.random()*10}s;--peak:${0.15+Math.random()*0.25}`;c.appendChild(p);}}

function spawnSparkle(parent){if(prefersReducedMotion)return;const s=document.createElement('div');s.className='sparkle-wrap';s.style.cssText=`top:${10+Math.random()*30}%;left:${20+Math.random()*60}%;`;s.innerHTML='<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 0L9.5 6.5L16 8L9.5 9.5L8 16L6.5 9.5L0 8L6.5 6.5Z" fill="currentColor" style="color:var(--accent)"/></svg>';parent.appendChild(s);setTimeout(()=>s.remove(),800);}
const origAnimC=animC;
animC=function(el){el.querySelectorAll('.counter-value[data-target]').forEach(cv=>{const tgt=parseFloat(cv.dataset.target),pre=cv.dataset.prefix||'',suf=cv.dataset.suffix||'',dur=parseInt(cv.dataset.duration)||2000,isF=tgt%1!==0;let st=null;function step(ts){if(!st)st=ts;const p=Math.min((ts-st)/dur,1),e=1-Math.pow(1-p,3),v=tgt*e;cv.textContent=pre+(isF?v.toFixed(1):Math.floor(v).toLocaleString())+suf;if(p<1)requestAnimationFrame(step);else{cv.textContent=pre+(isF?tgt.toFixed(1):tgt.toLocaleString())+suf;cv.classList.add('done');const item=cv.closest('.counter-item');if(item){item.classList.add('celebrated');spawnSparkle(item);spawnSparkle(item);setTimeout(()=>item.classList.remove('celebrated'),1000);}}}requestAnimationFrame(step);});};

let hintsShown=!localStorage.getItem('ds-hints-dismissed');
function dismissHints(){if(!hintsShown)return;hintsShown=false;const h=$('#navHints');if(h)h.classList.add('dismissed');try{localStorage.setItem('ds-hints-dismissed','1');}catch(e){}}
const origNav=nav;nav=function(ti){origNav(ti);dismissHints();};window.next=function(){origNav(state.ci+1);dismissHints();};window.prev=function(){origNav(state.ci-1);dismissHints();};
if(!hintsShown){const h=$('#navHints');if(h)h.style.display='none';}

buildNav();buildDots();spawnParticles();origNav(state.ci);
})();
</script>
</body>
</html>
